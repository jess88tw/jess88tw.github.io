<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js Demo - 互動 3D 場景</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #000;
        font-family: "Segoe UI", sans-serif;
      }
      canvas {
        display: block;
      }
      #info {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font-size: 14px;
        background: rgba(0, 0, 0, 0.5);
        padding: 8px 16px;
        border-radius: 8px;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="info">🖱️ 拖曳旋轉 ｜ 滾輪縮放 ｜ 右鍵平移</div>

    <!-- 使用 CDN 載入 Three.js -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      // ========== 場景設定 ==========
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x111122);
      scene.fog = new THREE.FogExp2(0x111122, 0.035);

      // ========== 相機設定 ==========
      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.set(0, 3, 8);

      // ========== 渲染器設定 ==========
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      // ========== 控制器 ==========
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.maxPolarAngle = Math.PI / 2 + 0.1;

      // ========== 光源 ==========
      // 環境光
      const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
      scene.add(ambientLight);

      // 主光源
      const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
      directionalLight.position.set(5, 10, 5);
      directionalLight.castShadow = true;
      directionalLight.shadow.mapSize.width = 1024;
      directionalLight.shadow.mapSize.height = 1024;
      scene.add(directionalLight);

      // 點光源（彩色）
      const pointLight1 = new THREE.PointLight(0xff6b6b, 2, 20);
      pointLight1.position.set(-3, 3, 3);
      scene.add(pointLight1);

      const pointLight2 = new THREE.PointLight(0x4ecdc4, 2, 20);
      pointLight2.position.set(3, 3, -3);
      scene.add(pointLight2);

      // ========== 地板 ==========
      const floorGeometry = new THREE.PlaneGeometry(50, 50);
      const floorMaterial = new THREE.MeshStandardMaterial({
        color: 0x222233,
        roughness: 0.8,
        metalness: 0.2,
      });
      const floor = new THREE.Mesh(floorGeometry, floorMaterial);
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -1.5;
      floor.receiveShadow = true;
      scene.add(floor);

      // ========== 中央主體：二十面體 ==========
      const icoGeometry = new THREE.IcosahedronGeometry(1.5, 0);
      const icoMaterial = new THREE.MeshStandardMaterial({
        color: 0x6c5ce7,
        roughness: 0.2,
        metalness: 0.8,
        flatShading: true,
      });
      const icosahedron = new THREE.Mesh(icoGeometry, icoMaterial);
      icosahedron.position.y = 1.5;
      icosahedron.castShadow = true;
      scene.add(icosahedron);

      // ========== 環繞的小方塊 ==========
      const cubes = [];
      const cubeCount = 12;
      const cubeColors = [
        0xff6b6b, 0x4ecdc4, 0xffe66d, 0xa29bfe, 0xfd79a8, 0x00cec9,
      ];

      for (let i = 0; i < cubeCount; i++) {
        const geometry = new THREE.BoxGeometry(0.4, 0.4, 0.4);
        const material = new THREE.MeshStandardMaterial({
          color: cubeColors[i % cubeColors.length],
          roughness: 0.3,
          metalness: 0.6,
        });
        const cube = new THREE.Mesh(geometry, material);
        cube.castShadow = true;
        scene.add(cube);
        cubes.push({
          mesh: cube,
          angle: (i / cubeCount) * Math.PI * 2,
          radius: 3.5,
          speed: 0.3 + Math.random() * 0.2,
          yOffset: Math.sin((i / cubeCount) * Math.PI * 2) * 0.5,
        });
      }

      // ========== 粒子系統 ==========
      const particleCount = 500;
      const particleGeometry = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);

      for (let i = 0; i < particleCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 30;
        positions[i * 3 + 1] = Math.random() * 15;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 30;
      }

      particleGeometry.setAttribute(
        "position",
        new THREE.BufferAttribute(positions, 3),
      );

      const particleMaterial = new THREE.PointsMaterial({
        color: 0xaaaaff,
        size: 0.05,
        transparent: true,
        opacity: 0.8,
      });

      const particles = new THREE.Points(particleGeometry, particleMaterial);
      scene.add(particles);

      // ========== 動畫循環 ==========
      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);
        const elapsed = clock.getElapsedTime();

        // 旋轉二十面體
        icosahedron.rotation.x = elapsed * 0.3;
        icosahedron.rotation.y = elapsed * 0.5;

        // 二十面體上下浮動
        icosahedron.position.y = 1.5 + Math.sin(elapsed * 0.8) * 0.3;

        // 環繞小方塊動畫
        cubes.forEach((cubeData) => {
          cubeData.angle += cubeData.speed * 0.01;
          cubeData.mesh.position.x = Math.cos(cubeData.angle) * cubeData.radius;
          cubeData.mesh.position.z = Math.sin(cubeData.angle) * cubeData.radius;
          cubeData.mesh.position.y =
            1.5 + Math.sin(elapsed * 1.5 + cubeData.angle) * cubeData.yOffset;
          cubeData.mesh.rotation.x = elapsed * 0.8;
          cubeData.mesh.rotation.y = elapsed * 1.2;
        });

        // 點光源繞行
        pointLight1.position.x = Math.sin(elapsed * 0.5) * 5;
        pointLight1.position.z = Math.cos(elapsed * 0.5) * 5;
        pointLight2.position.x = Math.sin(elapsed * 0.5 + Math.PI) * 5;
        pointLight2.position.z = Math.cos(elapsed * 0.5 + Math.PI) * 5;

        // 粒子緩慢上升
        const pos = particles.geometry.attributes.position.array;
        for (let i = 0; i < particleCount; i++) {
          pos[i * 3 + 1] += 0.005;
          if (pos[i * 3 + 1] > 15) {
            pos[i * 3 + 1] = 0;
          }
        }
        particles.geometry.attributes.position.needsUpdate = true;

        controls.update();
        renderer.render(scene, camera);
      }

      animate();

      // ========== RWD 處理 ==========
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
